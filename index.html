<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Asset Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        .app-view { display: none; }
        .app-view.active { display: block; }
        body { background-color: #020203; color: white; font-family: sans-serif; }
        .premium-card-ui { background: #0a0a0c; border: 1px solid #1e1e24; }
    </style>
</head>
<body class="pb-24">

    <section id="view-auth" class="app-view active p-6 max-w-md mx-auto space-y-6">
        <h1 class="text-2xl font-bold">Node Initialization</h1>
        <input id="auth-name" placeholder="Entity Name" class="w-full p-3 bg-zinc-900 rounded-lg text-white" />
        <input id="auth-email" placeholder="Email Contact" class="w-full p-3 bg-zinc-900 rounded-lg text-white" />
        <select id="auth-currency" class="w-full p-3 bg-zinc-900 rounded-lg text-white">
            <option value="KES">KES</option>
            <option value="NGN">NGN</option>
            <option value="USD">USD</option>
        </select>
        <button onclick="login()" class="w-full py-3 bg-[#00ff87] text-black font-bold rounded-lg">Sync Instance</button>
    </section>

    <main id="view-main" class="hidden p-4 max-w-md mx-auto space-y-5">
        <div class="flex justify-between items-center mb-4">
            <h2 id="user-greeting" class="font-bold text-lg">Node</h2>
            <div class="flex gap-2">
                <button id="btn-demo" onclick="switchEnv('demo')" class="px-2.5 py-1 rounded-md text-[9px] font-bold uppercase bg-zinc-800 text-white">Demo</button>
                <button id="btn-real" onclick="switchEnv('real')" class="px-2.5 py-1 rounded-md text-[9px] font-bold uppercase text-zinc-500 hover:text-white">Live</button>
            </div>
        </div>

        <section id="view-dashboard" class="app-view active space-y-5">
            <div class="p-5 rounded-2xl bg-[#0a0a0c] border border-[#1e1e24]">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase">Liquid Asset Vault</span>
                    <span id="env-badge" class="text-[8px] font-bold px-1.5 py-0.5 bg-zinc-900 border border-zinc-800 text-zinc-400 rounded uppercase">Demo Instance</span>
                </div>
                <h1 class="text-2xl font-bold text-white mb-4">
                    <span class="currency-symbol text-zinc-600 text-base mr-0.5">KES</span><span id="display-balance">10,000.00</span>
                </h1>
                <div class="grid grid-cols-2 gap-3 pt-3.5 border-t border-zinc-900">
                    <div>
                        <span class="text-[8px] font-bold text-zinc-500 uppercase block">Asset Allocation</span>
                        <div class="text-xs font-semibold text-zinc-300">
                            <span class="currency-symbol text-[10px] mr-0.5">KES</span><span id="display-assets-value">0.00</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-[8px] font-bold text-zinc-500 uppercase block">Yield Velocity</span>
                        <div class="text-xs font-bold text-[#00ff87] flex items-center justify-end">
                            +<span class="currency-symbol text-[10px] mr-0.5">KES</span><span id="display-hourly-yield">0.00</span><span class="text-[8px] text-zinc-500 ml-0.5">/hr</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 rounded-xl border border-dashed border-zinc-800 bg-zinc-950 space-y-3">
                <div class="flex items-center justify-between">
                    <div>
                        <h4 class="text-xs font-bold text-white">Live Operations Limit</h4>
                        <p class="text-[10px] text-zinc-500"><span id="active-slots-count">0</span> of <span id="max-slots-count">3</span> slots</p>
                    </div>
                    <button id="btn-upgrade-slots" onclick="upgradeLiveCapacity()" class="px-3 py-1.5 rounded-lg bg-white text-black font-bold text-[9px] uppercase">Expand (100 KES)</button>
                </div>
                <div class="w-full bg-zinc-900 rounded-full h-1 overflow-hidden">
                    <div id="slots-progress-bar" class="bg-[#f5af19] h-full" style="width: 0%"></div>
                </div>
            </div>

            <div class="p-4 rounded-xl bg-[#0a0a0c] border border-[#1e1e24] flex items-center justify-between">
                <h3 class="text-xs font-bold text-white">Auto-Compounding</h3>
                <input type="checkbox" id="toggle-compound" />
            </div>

            <div class="space-y-2.5">
                <h3 class="text-[9px] font-bold text-zinc-500 uppercase">Active Holdings</h3>
                <div id="my-goods-list" class="space-y-2"></div>
            </div>
        </section>

        <section id="view-market" class="app-view space-y-4">
            <div id="market-goods-container" class="grid grid-cols-1 gap-2.5"></div>
        </section>

        <section id="view-withdraw" class="app-view space-y-5">
             <div>
                <label class="text-[9px] font-bold text-zinc-500 uppercase block mb-1">Liquidation Quantity</label>
                <input type="number" id="input-withdraw" placeholder="0.00" class="w-full p-3.5 bg-[#111115] border border-[#1e1e24] rounded-xl text-white" />
            </div>
            <div>
                <label class="text-[9px] font-bold text-zinc-500 uppercase block mb-1">Target Ledger ID</label>
                <input type="text" id="input-withdraw-dest" placeholder="ID" class="w-full p-3.5 bg-[#111115] border border-[#1e1e24] rounded-xl text-white" />
            </div>
            <label class="block p-4 border border-dashed border-[#1e1e24] rounded-xl cursor-pointer text-center text-xs">
                <input type="file" id="input-withdraw-id" onchange="handleIdFileSelect(this)" class="hidden" />
                Upload National ID
            </label>
            <button onclick="processWithdraw()" class="w-full py-3.5 rounded-xl bg-white text-black font-bold text-xs uppercase">Authorize Settlement</button>
        </section>
        
        <section id="view-profile" class="app-view"><h2 class="text-lg font-bold">Investor Workspace</h2></section>
        <section id="view-deposit" class="app-view"><h2 class="text-lg font-bold">Inflow</h2></section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-[#020203]/95 backdrop-blur-md border-t border-[#1e1e24] pb-safe">
        <div class="max-w-md mx-auto grid grid-cols-5 px-1 py-2.5">
            <button onclick="navTo('dashboard')" id="nav-dashboard" class="flex flex-col items-center text-[#00ff87]">Vault</button>
            <button onclick="navTo('market')" id="nav-market" class="flex flex-col items-center">Catalog</button>
            <button onclick="navTo('profile')" id="nav-profile" class="flex flex-col items-center">Profile</button>
            <button onclick="navTo('deposit')" id="nav-deposit" class="flex flex-col items-center">Inflow</button>
            <button onclick="navTo('withdraw')" id="nav-withdraw" class="flex flex-col items-center">Payout</button>
        </div>
    </nav>

    <div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2"></div>

    <script>
        lucide.createIcons();
        const PAYSTACK_KEY = 'pk_live_ebbc4bdc1da0f8fc075bae6ce78da4f9c89552bc';
        const CURRENCY_CONFIG = {
            KES: { symbol: 'KES', minDep: 500, minWith: 30000, rate: 1 },
            NGN: { symbol: '₦', minDep: 5500, minWith: 330000, rate: 11 },
            USD: { symbol: '$', minDep: 5, minWith: 250, rate: 0.0075 }
        };

        const GOODS_CATALOG = [
            { id: 'g1', name: 'Automated Logistics Drone Unit', cost: 1200, hourlyYield: 25, icon: 'send' },
            { id: 'g2', name: 'Autonomous Forklift Tier-1 Chassis', cost: 2500, hourlyYield: 55, icon: 'truck' },
            { id: 'g3', name: 'Precision Conveyor Sorting Array', cost: 4000, hourlyYield: 90, icon: 'shuffle' },
            { id: 'g4', name: 'Fulfillment Station Scanners Node', cost: 5500, hourlyYield: 125, icon: 'scan' }
            // ... (Includes all 52 items defined in original part 3)
        ];

        let appState = {
            user: { name: '', email: '', currency: 'KES' },
            env: 'demo', autoCompound: false, idDocumentAttached: false,
            demo: { balance: 10000, maxLiveAssets: 3, myGoods: [] },
            real: { balance: 0, maxLiveAssets: 3, myGoods: [] },
            nextYieldTime: Date.now() + 3600000
        };

        function updateDashboard() {
            const state = getActiveState();
            let totalAssetValue = 0;
            let totalHourlyYield = 0;
            state.myGoods.forEach(good => {
                totalAssetValue += good.cost;
                totalHourlyYield += good.hourlyYield;
            });

            document.getElementById('display-balance').innerText = formatCurrency(state.balance);
            document.getElementById('display-assets-value').innerText = formatCurrency(totalAssetValue);
            document.getElementById('display-hourly-yield').innerText = formatCurrency(totalHourlyYield);
            document.getElementById('active-slots-count').innerText = state.myGoods.length;
            
            const list = document.getElementById('my-goods-list');
            list.innerHTML = '';
            
            if(state.myGoods.length === 0) {
                list.innerHTML = `<div class="text-center p-6 text-zinc-600 text-[11px]">No active units.</div>`;
            } else {
                const groupedGoods = {};
                state.myGoods.forEach(g => {
                    if(!groupedGoods[g.id]) groupedGoods[g.id] = { ...g, count: 0 };
                    groupedGoods[g.id].count++;
                });

                Object.values(groupedGoods).forEach(item => {
                    const totalYieldForGroup = item.hourlyYield * item.count;
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-3 bg-zinc-900/40 border border-zinc-900 rounded-xl">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center relative">
                                    <i data-lucide="${item.icon}" class="w-3.5 h-3.5 text-[#00ff87]"></i>
                                    ${item.count > 1 ? `<span class="absolute -top-1 -right-1 bg-white text-black text-[8px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center">${item.count}</span>` : ''}
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold text-white">${item.name}</h4>
                                    <p class="text-[9px] text-zinc-500">Live Yield Running</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-bold text-white">${formatCurrency(totalYieldForGroup)}</span>
                                <p class="text-[8px] text-zinc-500">/hr</p>
                            </div>
                        </div>
                    `;
                });
            }
            lucide.createIcons();
        }

        function formatCurrency(amount) {
            const rate = CURRENCY_CONFIG[appState.user.currency].rate;
            return (amount * rate).toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        function getActiveState() { return appState[appState.env]; }
        
        function login() {
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('view-main').style.display = 'block';
            updateDashboard();
        }
        
        function navTo(viewId) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
        }

        function switchEnv(env) {
            appState.env = env;
            updateDashboard();
        }

        function handleIdFileSelect(input) {
            if(input.files && input.files.length > 0) appState.idDocumentAttached = true;
        }

        function processWithdraw() {
            if (!appState.idDocumentAttached) {
                alert("Missing ID Document.");
                return;
            }
            // Proceed with withdrawal logic
        }

        function upgradeLiveCapacity() {
            // Implementation logic
        }
        
        // Ensure all UI elements exist on load
        updateDashboard();
    </script>
</body>
</html>
